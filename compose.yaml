services:
  app:
    image: ghcr.io/pnpm/pnpm:11.3.0
    ports:
      - 4321:4321
    working_dir: /app
    command: >
      bash -c "
      pnpm runtime set node 24 -g
      && pnpm install --frozen-lockfile
      && pnpm prune
      && pnpm run dev --host 0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./:/app
      - /app/node_modules
